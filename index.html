<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>JOKKO</title>
    
</head>

<body>
    <!--Partie Sidebar-->
    <div class="container">
        <div class="sidebarIcon">
            <div class="sidebarLogo">
                <img src="media/LOGO.JOKKO.png" alt="" width="150" height="100">
            </div>
            <div class="logoContacts">
                <div class="Logo"><i class="fa-regular fa-message" style="color: rgb(116, 192, 252);"></i></div>
                <div class="Logo"><i class="fa-solid fa-users" style="color: rgb(116, 192, 252);"></i></div>
                <div class="Logo"><i class="fa-solid fa-phone" style="color: white;"></i></div>
                <div class="Logo"><i class="fa-solid fa-gear" style="color: white;"></i></div>
            </div>
        </div>

<!--Partie Messages-->

<div class="Partie-container">
    <header class="header">
        <h1>Messages</h1>
        <span class="icon">✏️</span>
    </header>

    <div class="recherche-container">
        <input type="text" placeholder="Rechercher ou démarrer une conversation">
    </div>

    <div class="list">
        
        <div class="element active">
            <div class="photo av-purple">SM</div>
            <div class="info">
                <div class="haut">
                    <span class="nom">Sophie Martin</span>
                    <span class="date">14:32</span>
                    <span class="alerte">3</span>
                </div>
                <div class="Bas">
                    <p class="text">Super ! On se voit demain alor...</p>
                    
                </div>
            </div>
        </div>

        <div class="element">
            <div class="photo av-pink">JD</div>
            <div class="info">
                <div class="haut">
                    <span class="nom">Jean Dupont</span>
                    <span class="date">hier</span>
                </div>
                <p class="text">Est-ce que tu as reçu le document ?</p>
            </div>
        </div>

        <div class="element">
            <div class="photo av-blue">AL</div>
            <div class="info">
                <div class="haut">
                    <span class="nom">Équipe Projet</span>
                    <span class="date">mar</span>
                </div>
                <p class="texte">Marie : La réunion est confirmée ✅</p>
            </div>
        </div>

        <div class="element">
            <div class="photo av-orange">CB</div>
            <div class="info">
                <div class="haut">
                    <span class="nom">Claire Bernard</span>
                    <span class="date">lun</span>
                </div>
                <p class="text">Merci beaucoup pour ton aide !</p>
            </div>
        </div>

    </div>
</div>
    </div>
 
      
    
    

  


 

</body>
</html>
